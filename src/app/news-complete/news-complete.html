<app-header></app-header>
<div class="full-news-container-individual">
  <div class="container-news-main">
    <div class="news-bg-list-container">
      <div class="ak-title-container">
        <h1>
          <a class="ak-icon-big ak-news"></a>
          <div class="info-text-new">
            <div>{{noticia.titulo}}
              <p>{{noticia.date}}</p>
            </div>
            <div class="button-back" (click)="goBack()"><mat-icon> chevron_left </mat-icon><p>Volver a la lista</p> </div>
          </div>

        </h1>
      </div>
      <div class="container-news-cards">
        <div class="card-news">
          <div class="img-card-new">
            <img class="img-responsive-news" [src]="noticia.imagen" [alt]="noticia.titulo || 'noticia'" />
          </div>
          <div class="contenedor-noticias" [innerHTML]="noticia?.fullContentHTML">

          </div>
        </div>


      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>
